<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>造车制造招聘学习地图</title>
    <meta
      name="description"
      content="面向制造中心招聘的造车全流程岗位学习地图，支持按流程、模块、岗位类型和关键词快速筛选。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Manufacturing Recruiting Knowledge Map</p>
          <h1>造车制造招聘学习地图</h1>
          <p class="hero-text">
            按造车流程拆解岗位、工作内容和招聘关键词。适合制造中心招聘、岗位 mapping、面试准备和行业学习。
          </p>
        </div>
        <div class="hero-stats" id="hero-stats"></div>
      </header>

      <section class="toolbar">
        <label class="search-field">
          <span>搜索岗位 / 工作内容 / 关键词</span>
          <input
            id="search-input"
            type="search"
            placeholder="例如：焊装 工艺, PACK, 气密, SQE, PLC"
          />
        </label>

        <div class="filter-grid">
          <label>
            <span>流程</span>
            <select id="process-filter">
              <option value="all">全部流程</option>
            </select>
          </label>

          <label>
            <span>岗位类型</span>
            <select id="level-filter">
              <option value="all">全部类型</option>
              <option value="engineer">工程/专业岗</option>
              <option value="management">管理/计划岗</option>
              <option value="general">综合职能岗</option>
              <option value="operator">技工/操作岗</option>
            </select>
          </label>

          <label>
            <span>模块</span>
            <select id="type-filter">
              <option value="all">全部模块</option>
              <option value="general">产品规划 / 工业化 / 机加</option>
              <option value="development">研发 / 试制 / 验证</option>
              <option value="supply-chain">采购 / 供应链 / 物流计划</option>
              <option value="manufacturing">冲压 / 焊装 / 涂装 / 总装 / 终检</option>
              <option value="new-energy">PACK / 电驱 / 一体压铸</option>
              <option value="support">质量 / 设备 / EHS / 数字化 / 生产运营</option>
            </select>
          </label>
        </div>

        <div class="toggle-row">
          <label class="toggle">
            <input id="high-frequency-filter" type="checkbox" />
            <span>只看高频招聘岗位</span>
          </label>
          <label class="toggle">
            <input id="new-energy-filter" type="checkbox" />
            <span>只看新能源特色岗位</span>
          </label>
          <button id="reset-filters" type="button" class="ghost-button">重置筛选</button>
        </div>
      </section>

      <section class="overview" id="overview"></section>

      <div class="content-grid">
        <aside class="sidebar">
          <div class="sidebar-card">
            <p class="sidebar-title">流程导航</p>
            <nav id="section-nav" class="section-nav"></nav>
          </div>
        </aside>

        <main class="results-panel">
          <div class="results-header">
            <div>
              <p class="results-title">岗位清单</p>
              <p class="results-subtitle" id="results-summary"></p>
            </div>
            <div class="legend">
              <span class="legend-chip"><i class="dot dot-hot"></i>高频招聘</span>
              <span class="legend-chip"><i class="dot dot-energy"></i>新能源</span>
            </div>
          </div>

          <div id="sections-container" class="sections-container"></div>
          <div id="empty-state" class="empty-state" hidden>
            没有匹配结果。可以清空筛选或更换关键词。
          </div>
        </main>
      </div>
    </div>

    <dialog id="job-dialog" class="job-dialog">
      <div class="dialog-head">
        <div>
          <p id="dialog-section" class="dialog-section"></p>
          <h2 id="dialog-title"></h2>
        </div>
        <button id="close-dialog" class="icon-button" type="button" aria-label="关闭">
          ×
        </button>
      </div>
      <div class="dialog-body">
        <div class="dialog-block">
          <p class="dialog-label">工作内容</p>
          <p id="dialog-description" class="dialog-description"></p>
        </div>
        <div class="dialog-block">
          <p class="dialog-label">招聘关键词</p>
          <div id="dialog-keywords" class="keyword-row"></div>
        </div>
        <div class="dialog-meta" id="dialog-meta"></div>
      </div>
    </dialog>

    <script src="./jobs-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
