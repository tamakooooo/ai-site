<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型广场 - 面包AI中转站</title>
  <style>
    :root {
      /* Brand Colors - 面包AI中转站 */
      --bg: oklch(98.2% 0.005 95.1);
      --surface: oklch(96.6% 0.009 100);
      --fg: oklch(19.1% 0.002 106.6);
      --muted: oklch(35.9% 0.005 106.7);
      --border: oklch(89.2% 0.021 79.1);
      --accent: oklch(67.2% 0.131 38.8);
      --accent-strong: oklch(60.8% 0.138 39);
      --accent-soft: color-mix(in oklch, var(--accent) 12%, white);
      
      /* Typography */
      --font-display: "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif;
      --font-body: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
      --font-mono: "SF Mono", "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;
      
      /* Shadows */
      --shadow-soft: 0 18px 60px color-mix(in oklch, var(--accent) 8%, transparent);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      background: var(--bg);
      color: var(--fg);
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: var(--font-body);
      background:
        radial-gradient(circle at top left, color-mix(in oklch, var(--accent) 5%, white) 0, transparent 36%),
        linear-gradient(180deg, var(--bg) 0%, color-mix(in oklch, var(--surface) 74%, white) 100%);
      min-height: 100vh;
      color: var(--fg);
      line-height: 1.6;
    }

    /* Topline */
    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 24px 0 0;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .topline::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Shell */
    .shell {
      width: min(calc(100% - 48px), 1240px);
      margin: 0 auto;
    }

    /* Header */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(14px);
      background: color-mix(in oklch, var(--bg) 92%, white);
      border-bottom: 1px solid var(--border);
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      min-height: 78px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 600;
      letter-spacing: -0.02em;
      cursor: pointer;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
    }

    .brand-copy strong {
      display: block;
      font-size: 21px;
      line-height: 1;
    }

    .brand-copy small {
      display: block;
      margin-top: 3px;
      color: var(--accent-strong);
      font-size: 10px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      color: var(--muted);
      font-size: 14px;
    }

    .nav-links a {
      color: inherit;
      text-decoration: none;
      transition: color 180ms ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--fg);
    }

    /* Main Content */
    .main-content {
      padding: 48px 0 80px;
    }

    /* Page Header */
    .page-header {
      margin-bottom: 40px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      color: var(--accent-strong);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 16px;
    }

    .page-desc {
      color: var(--muted);
      font-size: 16px;
      max-width: 560px;
      line-height: 1.65;
    }

    .unit-tag {
      display: inline-block;
      background: var(--surface);
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin: 40px 0;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-soft);
    }

    .stat-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: color-mix(in oklch, var(--accent) 12%, white);
      color: var(--accent-strong);
    }

    .stat-info {
      display: flex;
      flex-direction: column;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--fg);
      line-height: 1;
      font-family: var(--font-mono);
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.05em;
    }

    /* Filters */
    .filters-section {
      margin-bottom: 40px;
    }

    .filters-row {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-box {
      position: relative;
      flex: 1;
      min-width: 320px;
      max-width: 400px;
    }

    .search-box input {
      width: 100%;
      padding: 14px 20px 14px 48px;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 15px;
      color: var(--fg);
      background: var(--surface);
      transition: border-color 180ms ease, box-shadow 180ms ease;
      font-family: var(--font-body);
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 15%, transparent);
    }

    .search-box input::placeholder {
      color: var(--muted);
      opacity: 0.7;
    }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 16px;
    }

    .filter-btn {
      padding: 14px 24px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 180ms ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent-strong);
    }

    .filter-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* Group Section */
    .group-section {
      margin-bottom: 48px;
    }

    .group-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .brand-tag {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: color-mix(in oklch, var(--accent) 10%, white);
      color: var(--accent-strong);
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
    }

    .brand-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    }

    .info-tag {
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    .info-tag.highlight {
      background: color-mix(in oklch, var(--accent) 10%, white);
      color: var(--accent-strong);
      border-color: color-mix(in oklch, var(--accent) 25%, transparent);
    }

    .group-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      margin: 24px 0 8px;
    }

    .group-desc {
      font-size: 15px;
      color: var(--muted);
    }

    /* Models Grid */
    .models-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .model-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .model-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-soft);
      border-color: color-mix(in oklch, var(--accent) 30%, var(--border));
    }

    .model-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .model-title {
      display: flex;
      flex-direction: column;
    }

    .model-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--fg);
      margin-bottom: 4px;
    }

    .model-id {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
    }

    .pricing-badge {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .pricing-badge.token {
      background: color-mix(in oklch, #3b82f6 12%, white);
      color: #1d4ed8;
    }

    .pricing-badge.context {
      background: color-mix(in oklch, var(--accent) 15%, white);
      color: var(--accent-strong);
    }

    /* Pricing Rows */
    .pricing-rows {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .pricing-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--bg);
      border-radius: 14px;
      border: 1px solid var(--border);
    }

    .pricing-row.context {
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }

    .pricing-label {
      font-size: 14px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pricing-label-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    .pricing-value {
      font-size: 14px;
      color: var(--muted);
      font-weight: 500;
    }

    .pricing-value .price {
      color: var(--fg);
      font-weight: 700;
      font-family: var(--font-mono);
    }

    .context-row-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .context-range {
      font-size: 13px;
      color: var(--muted);
      font-family: var(--font-mono);
      background: var(--surface);
      padding: 4px 10px;
      border-radius: 8px;
    }

    /* View Details */
    .view-details {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      color: var(--accent-strong);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: color 180ms ease;
    }

    .view-details:hover {
      color: var(--accent);
    }

    .context-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: color-mix(in oklch, var(--surface) 85%, white);
      margin-bottom: 14px;
    }

    .context-toggle-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-family: var(--font-mono);
      cursor: pointer;
      transition: all 180ms ease;
    }

    .context-toggle-btn:hover {
      color: var(--accent-strong);
    }

    .context-toggle-btn.active {
      background: color-mix(in oklch, var(--accent) 14%, white);
      color: var(--accent-strong);
      box-shadow: inset 0 0 0 1px color-mix(in oklch, var(--accent) 18%, transparent);
    }

    .context-panels {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .context-panel {
      display: none;
    }

    .context-panel.active {
      display: block;
    }

    .feature-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .feature-tag {
      padding: 6px 10px;
      border-radius: 999px;
      background: color-mix(in oklch, var(--accent) 8%, white);
      color: var(--accent-strong);
      border: 1px solid color-mix(in oklch, var(--accent) 18%, transparent);
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 80px;
      color: var(--muted);
    }

    .error {
      text-align: center;
      padding: 60px;
      color: var(--accent-strong);
      background: color-mix(in oklch, var(--accent) 8%, white);
      border-radius: 24px;
      margin: 40px 0;
      border: 1px solid color-mix(in oklch, var(--accent) 20%, transparent);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .stats-row { grid-template-columns: 1fr; }
      .filters-row { flex-direction: column; align-items: stretch; }
      .search-box { max-width: 100%; }
      .models-grid { grid-template-columns: 1fr; }
      .page-title { font-size: 32px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <!-- Topline -->
    <div class="topline">
      <span>MODEL MARKETPLACE</span>
    </div>
    
    <!-- Header -->
    <header class="site-header">
      <div class="header-row">
        <div class="brand" onclick="goHome()">
          <div class="brand-mark">🍞</div>
          <div class="brand-copy">
            <strong>面包AI</strong>
            <small>BREAD AI GATEWAY</small>
          </div>
        </div>
        <nav class="nav-links">
          <a href="/ai-site/sites/homepage/">首页</a>
          <a href="#" class="active">模型广场</a>
          <a href="#">控制台</a>
          <a href="#">文档</a>
        </nav>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Page Header -->
      <div class="page-header">
        <div class="eyebrow">BROWSE MODELS</div>
        <h1 class="page-title">模型广场</h1>
        <p class="page-desc" id="pageDesc">按公开分组浏览当前可用模型，并直接查看已包含分组倍率的实际扣费价格。价格单位为 <span class="unit-tag" id="unitTag">推理积分</span></p>
      </div>

      <!-- Stats -->
      <div class="stats-row" id="statsRow">
        <div class="stat-card">
          <div class="stat-icon">⊞</div>
          <div class="stat-info">
            <div class="stat-value" id="groupStat">0</div>
            <div class="stat-label">匹配分组</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">✦</div>
          <div class="stat-info">
            <div class="stat-value" id="modelStat">0</div>
            <div class="stat-label">匹配模型</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">◉</div>
          <div class="stat-info">
            <div class="stat-value" id="brandStat">0</div>
            <div class="stat-label">品牌数量</div>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div class="filters-section">
        <div class="filters-row">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="搜索模型名称、ID 或品牌..." oninput="filterModels()">
          </div>
          <button class="filter-btn active" onclick="filterType('all')" id="btnAll">全部</button>
          <button class="filter-btn" onclick="filterType('token')" id="btnToken">Token 计费</button>
          <button class="filter-btn" onclick="filterType('context')" id="btnContext">区间定价</button>
        </div>
      </div>

      <!-- Content -->
      <div id="content">
        <div class="loading">正在加载模型数据...</div>
      </div>
    </main>
  </div>

<script>
let configData = null;
let allModels = [];
let currentFilter = 'all';

function goHome() {
  window.location.href = '/ai-site/sites/homepage/';
}

async function loadConfig() {
  try {
    const response = await fetch('config.json');
    if (!response.ok) throw new Error('无法加载配置文件');
    configData = await response.json();
    renderPage();
  } catch (error) {
    console.error('加载失败:', error);
    document.getElementById('content').innerHTML = 
      '<div class="error">加载配置文件失败，请检查 config.json 是否存在</div>';
  }
}

function renderPage() {
  document.getElementById('pageDesc').innerHTML = (configData.description || '按公开分组浏览当前可用模型，并直接查看已包含分组倍率的实际扣费价格。') + 
    ` 价格单位为 <span class="unit-tag">${configData.unit || '推理积分'}</span>`;
  
  const totalModels = configData.groups?.reduce((sum, g) => sum + (g.models?.length || 0), 0) || 0;
  const totalBrands = new Set(configData.groups?.map(g => g.brand)).size || 0;
  
  document.getElementById('groupStat').textContent = configData.groups?.length || 0;
  document.getElementById('modelStat').textContent = totalModels;
  document.getElementById('brandStat').textContent = totalBrands;
  
  allModels = [];
  configData.groups?.forEach(group => {
    group.models?.forEach(model => {
      allModels.push({ ...model, group: group });
    });
  });
  
  renderContent(configData.groups);
}

function renderContent(groups) {
  const content = document.getElementById('content');
  content.innerHTML = groups?.map(group => `
    <div class="group-section">
      <div class="group-header">
        <div class="brand-tag">
          <div class="brand-icon"></div>
          <span>${group.brand}</span>
        </div>
        ${group.tags?.map(tag => `<span class="info-tag ${tag.highlight ? 'highlight' : ''}">${tag.text}</span>`).join('') || ''}
      </div>
      <h2 class="group-title">${group.name}</h2>
      ${group.description ? `<p class="group-desc">${group.description}</p>` : ''}
      
      <div class="models-grid">
        ${group.models?.map(model => renderModelCard(model, group)).join('') || ''}
      </div>
    </div>
  `).join('');
}

function applyGroupMultiplier(value, groupMultiplier) {
  if (typeof value !== 'number') return value;
  return value * (groupMultiplier || 1);
}

function renderModelCard(model, group) {
  const isToken = model.pricingType === 'token';
  const pricingHTML = isToken
    ? renderTokenPricing(model.pricing, group?.groupMultiplier)
    : renderContextPricing(model.pricing, group?.groupMultiplier);
  const featureHTML = model.features?.length
    ? `<div class="feature-tags">${model.features.map(feature => `<span class="feature-tag">${feature}</span>`).join('')}</div>`
    : '';
  
  return `
    <div class="model-card" data-type="${model.pricingType}" data-name="${(model.name + ' ' + model.id + ' ' + model.group?.brand).toLowerCase()}">
      <div class="model-header">
        <div class="model-title">
          <div class="model-name">${model.name}</div>
          <div class="model-id">${model.id}</div>
        </div>
        <span class="pricing-badge ${isToken ? 'token' : 'context'}">${model.pricingLabel}</span>
      </div>
      <div class="pricing-rows">${pricingHTML}</div>
      ${featureHTML}
    </div>
  `;
}

function renderTokenPricing(pricing, groupMultiplier = 1) {
  const rows = [
    { label: '输入', value: pricing.input, color: '#3b82f6' },
    { label: '输出', value: pricing.output, color: '#8b5cf6' }
  ];

  if (typeof pricing.cacheRead === 'number') {
    rows.push({ label: '缓存读取', value: pricing.cacheRead, color: '#10b981' });
  }
  if (typeof pricing.cacheWrite === 'number') {
    rows.push({ label: '缓存写入', value: pricing.cacheWrite, color: '#f59e0b' });
  }

  return rows.map(row => `
    <div class="pricing-row">
      <div class="pricing-label"><span class="pricing-label-dot" style="background: ${row.color};"></span>${row.label}</div>
      <div class="pricing-value"><span class="price">${applyGroupMultiplier(row.value, groupMultiplier).toFixed(2)}</span> 推理积分 / 1M Token</div>
    </div>
  `).join('');
}

function renderContextPricing(pricing, groupMultiplier = 1) {
  return pricing.ranges.map(range => {
    const extras = [];
    if (typeof range.cacheRead === 'number') {
      extras.push(`缓存读取 <span class="price">${applyGroupMultiplier(range.cacheRead, groupMultiplier).toFixed(2)}</span>`);
    }
    if (typeof range.cacheWrite === 'number') {
      extras.push(`缓存写入 <span class="price">${applyGroupMultiplier(range.cacheWrite, groupMultiplier).toFixed(2)}</span>`);
    }

    const extraText = extras.length ? ` / ${extras.join(' / ')}` : '';

    return `
      <div class="pricing-row context">
        <div class="context-row-header">
          <span class="context-range">${range.label}</span>
          <span class="pricing-value">输入 <span class="price">${applyGroupMultiplier(range.input, groupMultiplier).toFixed(2)}</span> / 输出 <span class="price">${applyGroupMultiplier(range.output, groupMultiplier).toFixed(2)}</span>${extraText}</span>
        </div>
      </div>
    `;
  }).join('');
}

function filterType(type) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('active');
  filterModels();
}

function filterModels() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const filteredGroups = configData.groups.map(group => {
    const filteredModels = group.models.filter(model => {
      const matchesType = currentFilter === 'all' || model.pricingType === currentFilter;
      const matchesSearch = !query || 
        model.name.toLowerCase().includes(query) ||
        model.id.toLowerCase().includes(query) ||
        group.brand.toLowerCase().includes(query);
      return matchesType && matchesSearch;
    });
    return { ...group, models: filteredModels };
  }).filter(group => group.models.length > 0);
  
  renderContent(filteredGroups);
}

document.addEventListener('DOMContentLoaded', loadConfig);
</script>
</body>
</html>
