<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型广场</title>
  <style>
    :root {
      --bg: #f4f8fb;
      --bg-grid: rgba(141, 187, 225, 0.22);
      --panel: rgba(255, 255, 255, 0.96);
      --panel-soft: #f9fcff;
      --line: rgba(154, 185, 212, 0.34);
      --line-strong: rgba(126, 166, 201, 0.5);
      --text: #1f2937;
      --muted: #6b7280;
      --soft: #94a3b8;
      --accent: #4b9fe1;
      --accent-strong: #297cc0;
      --accent-soft: rgba(75, 159, 225, 0.12);
      --brand-bg: #eef7ff;
      --shadow: 0 18px 48px rgba(86, 126, 164, 0.12);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --max-width: 1480px;
      --font-display: "Iowan Old Style", "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif;
      --font-body: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
      --font-mono: "SF Mono", "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: var(--font-body);
      background:
        linear-gradient(var(--bg-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px),
        radial-gradient(circle at top, rgba(163, 210, 244, 0.38), transparent 42%),
        linear-gradient(180deg, #dff1ff 0%, var(--bg) 240px, #f7fbff 100%);
      background-size: 28px 28px, 28px 28px, auto, auto;
    }

    body {
      padding: 18px;
    }

    a,
    button,
    input,
    select {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select {
      border: 0;
      outline: 0;
      background: none;
    }

    .page {
      width: min(100%, var(--max-width));
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .brand-link {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #ffffff, #edf7ff);
      border: 1px solid rgba(126, 166, 201, 0.28);
      box-shadow: 0 8px 20px rgba(86, 126, 164, 0.12);
      font-weight: 700;
      color: var(--accent-strong);
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-copy small {
      display: block;
      margin-bottom: 4px;
      color: var(--accent-strong);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .brand-copy strong {
      display: block;
      font-size: 19px;
      letter-spacing: -0.03em;
    }

    .brand-copy span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .embed-badge,
    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.78);
      color: var(--muted);
      font-size: 13px;
    }

    .embed-badge {
      display: none;
    }

    .embed-badge.visible {
      display: inline-flex;
    }

    .back-link:hover {
      border-color: var(--line-strong);
      color: var(--accent-strong);
    }

    .toolbar {
      position: sticky;
      top: 12px;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(0, 1.8fr) repeat(3, minmax(160px, 0.72fr));
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(231, 245, 255, 0.84);
      backdrop-filter: blur(14px);
      box-shadow: 0 14px 36px rgba(86, 126, 164, 0.1);
    }

    .field {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      padding: 0 14px;
      border: 1px solid rgba(154, 185, 212, 0.28);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.94);
      color: var(--muted);
    }

    .field:focus-within {
      border-color: rgba(75, 159, 225, 0.44);
      box-shadow: 0 0 0 4px rgba(75, 159, 225, 0.08);
    }

    .field-icon {
      color: var(--soft);
      font-size: 14px;
      flex: 0 0 auto;
    }

    .field input,
    .field select {
      width: 100%;
      color: var(--text);
      background: transparent;
    }

    .field input::placeholder {
      color: var(--soft);
    }

    .state-card,
    .group-section {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .state-card {
      margin-top: 16px;
      padding: 30px 24px;
      text-align: center;
      color: var(--muted);
    }

    .state-card strong {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 18px;
    }

    .group-list {
      display: grid;
      gap: 14px;
      margin-top: 16px;
      padding-bottom: 18px;
    }

    .group-section {
      overflow: hidden;
    }

    .group-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 20px;
      border-bottom: 1px solid rgba(154, 185, 212, 0.18);
      background: linear-gradient(180deg, #ffffff 0%, var(--panel-soft) 100%);
    }

    .group-main {
      min-width: 0;
    }

    .group-brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--brand-bg);
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 600;
    }

    .group-brand::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(180deg, #7bc1f5, var(--accent-strong));
    }

    .group-title {
      margin: 12px 0 0;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .group-desc {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .group-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tag,
    .metric-pill,
    .type-pill,
    .feature-tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
    }

    .tag {
      border: 1px solid rgba(154, 185, 212, 0.3);
      background: #ffffff;
      color: var(--muted);
    }

    .tag.highlight {
      border-color: rgba(75, 159, 225, 0.32);
      background: rgba(75, 159, 225, 0.08);
      color: var(--accent-strong);
    }

    .group-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .metric-pill {
      border: 1px solid rgba(154, 185, 212, 0.3);
      background: #ffffff;
      color: var(--muted);
    }

    .metric-pill strong {
      margin-left: 6px;
      color: var(--text);
      font-weight: 700;
    }

    .models {
      padding: 10px 12px 12px;
    }

    .models-head,
    .model-row {
      display: grid;
      grid-template-columns: minmax(220px, 1.25fr) minmax(120px, 0.45fr) minmax(300px, 1fr) minmax(180px, 0.7fr);
      gap: 14px;
      align-items: start;
    }

    .models-head {
      padding: 0 12px 10px;
      color: var(--soft);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .model-row {
      padding: 14px 12px;
      border-top: 1px solid rgba(154, 185, 212, 0.16);
    }

    .model-row:first-of-type {
      border-top: 0;
    }

    .model-name {
      min-width: 0;
    }

    .model-name strong {
      display: block;
      font-size: 15px;
      letter-spacing: -0.01em;
    }

    .model-id {
      margin-top: 4px;
      color: var(--soft);
      font-family: var(--font-mono);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .type-pill {
      justify-content: center;
      border: 1px solid rgba(75, 159, 225, 0.18);
      background: rgba(75, 159, 225, 0.08);
      color: var(--accent-strong);
      font-weight: 600;
    }

    .price-list {
      display: grid;
      gap: 8px;
    }

    .price-line {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      min-height: 38px;
      padding: 8px 12px;
      border-radius: 12px;
      background: #fbfdff;
      border: 1px solid rgba(154, 185, 212, 0.18);
    }

    .price-label {
      color: var(--muted);
      font-size: 13px;
      flex: 0 0 auto;
    }

    .price-value {
      color: var(--text);
      font-size: 13px;
      text-align: right;
      line-height: 1.5;
    }

    .price-value strong {
      font-size: 15px;
      letter-spacing: -0.02em;
    }

    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-start;
    }

    .feature-tag {
      border: 1px solid rgba(154, 185, 212, 0.22);
      background: rgba(238, 247, 255, 0.72);
      color: var(--muted);
    }

    .empty-note {
      color: var(--soft);
      font-size: 13px;
    }

    @media (max-width: 1180px) {
      .toolbar {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .models-head,
      .model-row {
        grid-template-columns: minmax(0, 1fr) minmax(120px, 0.4fr);
      }

      .models-head div:nth-child(3),
      .models-head div:nth-child(4) {
        display: none;
      }

      .model-pricing,
      .model-features {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 820px) {
      body {
        padding: 12px;
      }

      .topbar,
      .group-head {
        flex-direction: column;
        align-items: stretch;
      }

      .group-metrics {
        justify-content: flex-start;
      }

      .toolbar {
        position: static;
        grid-template-columns: 1fr;
      }

      .models-head {
        display: none;
      }

      .model-row {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .price-line {
        flex-direction: column;
        align-items: flex-start;
      }

      .price-value {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="brand-link" href="/ai-site/sites/homepage/">
        <div class="brand-mark">AI</div>
        <div class="brand-copy">
          <small>Model Market</small>
          <strong id="brandTitle">模型广场</strong>
          <span id="brandSubtitle">按分组浏览当前可用模型</span>
        </div>
      </a>
      <div class="topbar-actions">
        <span class="embed-badge" id="embedBadge">嵌入模式</span>
        <a class="back-link" href="/ai-site/sites/homepage/">返回首页</a>
      </div>
    </header>

    <section class="toolbar">
      <label class="field">
        <span class="field-icon">⌕</span>
        <input id="searchInput" type="text" placeholder="搜索品牌、分组名称、模型 ID 或显示名称">
      </label>
      <label class="field">
        <select id="brandFilter">
          <option value="all">全部品牌</option>
        </select>
      </label>
      <label class="field">
        <select id="typeFilter">
          <option value="all">全部类型</option>
          <option value="token">Token 计费</option>
          <option value="context">上下文区间定价</option>
        </select>
      </label>
      <label class="field">
        <select id="groupFilter">
          <option value="all">全部分组</option>
        </select>
      </label>
    </section>

    <div class="state-card" id="loadingState">
      <strong>正在加载模型数据</strong>
      <span>页面会根据配置自动生成分组与价格。</span>
    </div>

    <div class="state-card" id="emptyState" hidden>
      <strong>没有匹配结果</strong>
      <span>可以换一个关键词，或者放宽筛选条件再试一次。</span>
    </div>

    <main class="group-list" id="groupList" hidden></main>
  </div>

  <script>
    let configData = null;

    const els = {
      brandTitle: document.getElementById("brandTitle"),
      brandSubtitle: document.getElementById("brandSubtitle"),
      embedBadge: document.getElementById("embedBadge"),
      searchInput: document.getElementById("searchInput"),
      brandFilter: document.getElementById("brandFilter"),
      typeFilter: document.getElementById("typeFilter"),
      groupFilter: document.getElementById("groupFilter"),
      loadingState: document.getElementById("loadingState"),
      emptyState: document.getElementById("emptyState"),
      groupList: document.getElementById("groupList")
    };

    function getUnitLabel() {
      return configData?.unit || "美元";
    }

    function applyGroupMultiplier(value, groupMultiplier) {
      if (typeof value !== "number") return value;
      return value * (groupMultiplier || 1);
    }

    function formatPrice(value) {
      if (typeof value !== "number") return "-";
      const digits = value >= 10 ? 2 : 3;
      return value.toFixed(digits).replace(/\.?0+$/, "");
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function buildOptions() {
      const groups = configData?.groups || [];
      const brands = [...new Set(groups.map((group) => group.brand).filter(Boolean))].sort();
      const groupNames = [...new Set(groups.map((group) => group.name).filter(Boolean))].sort();

      els.brandFilter.innerHTML =
        '<option value="all">全部品牌</option>' +
        brands.map((brand) => `<option value="${escapeHTML(brand)}">${escapeHTML(brand)}</option>`).join("");

      els.groupFilter.innerHTML =
        '<option value="all">全部分组</option>' +
        groupNames.map((name) => `<option value="${escapeHTML(name)}">${escapeHTML(name)}</option>`).join("");
    }

    function getFilteredGroups() {
      const keyword = els.searchInput.value.trim().toLowerCase();
      const brandFilter = els.brandFilter.value;
      const typeFilter = els.typeFilter.value;
      const groupFilter = els.groupFilter.value;

      return (configData?.groups || []).map((group) => {
        if (brandFilter !== "all" && group.brand !== brandFilter) return null;
        if (groupFilter !== "all" && group.name !== groupFilter) return null;

        const models = (group.models || []).filter((model) => {
          if (typeFilter !== "all" && model.pricingType !== typeFilter) return false;

          if (!keyword) return true;

          const haystack = [
            group.brand,
            group.name,
            group.description,
            ...(group.tags || []).map((tag) => tag.text),
            model.name,
            model.id,
            model.pricingLabel,
            ...(model.features || [])
          ]
            .filter(Boolean)
            .join(" ")
            .toLowerCase();

          return haystack.includes(keyword);
        });

        if (!models.length) return null;
        return { ...group, models };
      }).filter(Boolean);
    }

    function renderPageMeta() {
      const title = configData?.title || "模型广场";

      document.title = title;
      els.brandTitle.textContent = title;
      els.brandSubtitle.textContent = `价格单位：${getUnitLabel()}，已包含分组倍率`;

      const params = new URLSearchParams(window.location.search);
      if ((params.get("ui_mode") || "") === "embedded") {
        els.embedBadge.classList.add("visible");
      }
    }

    function renderGroupTags(tags) {
      return (tags || [])
        .map((tag) => `<span class="tag ${tag.highlight ? "highlight" : ""}">${escapeHTML(tag.text)}</span>`)
        .join("");
    }

    function renderTokenPricing(pricing, groupMultiplier) {
      const unit = escapeHTML(getUnitLabel());
      const rows = [
        { label: "输入", value: pricing.input },
        { label: "输出", value: pricing.output }
      ];

      if (typeof pricing.cacheRead === "number") {
        rows.push({ label: "缓存读取", value: pricing.cacheRead });
      }
      if (typeof pricing.cacheWrite === "number") {
        rows.push({ label: "缓存写入", value: pricing.cacheWrite });
      }

      return `
        <div class="price-list">
          ${rows.map((row) => `
            <div class="price-line">
              <span class="price-label">${row.label}</span>
              <span class="price-value"><strong>${formatPrice(applyGroupMultiplier(row.value, groupMultiplier))}</strong> ${unit} / 1M Token</span>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderContextPricing(pricing, groupMultiplier) {
      const unit = escapeHTML(getUnitLabel());
      return `
        <div class="price-list">
          ${(pricing.ranges || []).map((range) => {
            const extras = [];

            if (typeof range.cacheRead === "number") {
              extras.push(`缓存读取 ${formatPrice(applyGroupMultiplier(range.cacheRead, groupMultiplier))}`);
            }
            if (typeof range.cacheWrite === "number") {
              extras.push(`缓存写入 ${formatPrice(applyGroupMultiplier(range.cacheWrite, groupMultiplier))}`);
            }

            return `
              <div class="price-line">
                <span class="price-label">${escapeHTML(range.label)}</span>
                <span class="price-value">
                  输入 <strong>${formatPrice(applyGroupMultiplier(range.input, groupMultiplier))}</strong>
                  / 输出 <strong>${formatPrice(applyGroupMultiplier(range.output, groupMultiplier))}</strong>
                  ${extras.length ? `<br><span class="empty-note">${escapeHTML(extras.join(" / "))} ${unit}</span>` : ""}
                </span>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderFeatures(features) {
      if (!features?.length) {
        return '<span class="empty-note">无额外说明</span>';
      }

      return `
        <div class="features">
          ${features.map((feature) => `<span class="feature-tag">${escapeHTML(feature)}</span>`).join("")}
        </div>
      `;
    }

    function renderModelRow(model, group) {
      const pricing = model.pricingType === "context"
        ? renderContextPricing(model.pricing || {}, group.groupMultiplier)
        : renderTokenPricing(model.pricing || {}, group.groupMultiplier);

      return `
        <div class="model-row">
          <div class="model-name">
            <strong>${escapeHTML(model.name || model.id || "Unnamed model")}</strong>
            <div class="model-id">${escapeHTML(model.id || "")}</div>
          </div>
          <div class="model-type">
            <span class="type-pill">${escapeHTML(model.pricingLabel || "")}</span>
          </div>
          <div class="model-pricing">${pricing}</div>
          <div class="model-features">${renderFeatures(model.features || [])}</div>
        </div>
      `;
    }

    function renderGroups() {
      const groups = getFilteredGroups();

      els.loadingState.hidden = true;
      els.emptyState.hidden = groups.length !== 0;
      els.groupList.hidden = groups.length === 0;

      els.groupList.innerHTML = groups.map((group) => `
        <section class="group-section">
          <div class="group-head">
            <div class="group-main">
              <div class="group-brand">${escapeHTML(group.brand || "Unknown")}</div>
              <h2 class="group-title">${escapeHTML(group.name || "未命名分组")}</h2>
              ${group.description ? `<p class="group-desc">${escapeHTML(group.description)}</p>` : ""}
              <div class="group-tags">${renderGroupTags(group.tags || [])}</div>
            </div>
            <div class="group-metrics">
              <span class="metric-pill">分组倍率<strong>x${formatPrice(group.groupMultiplier || 1)}</strong></span>
              <span class="metric-pill">模型数<strong>${group.models?.length || 0}</strong></span>
            </div>
          </div>
          <div class="models">
            <div class="models-head">
              <div>模型</div>
              <div>计费类型</div>
              <div>价格</div>
              <div>特性</div>
            </div>
            ${(group.models || []).map((model) => renderModelRow(model, group)).join("")}
          </div>
        </section>
      `).join("");
    }

    async function loadConfig() {
      try {
        const response = await fetch("config.json");
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        configData = await response.json();
        renderPageMeta();
        buildOptions();
        renderGroups();
      } catch (error) {
        console.error("加载配置失败", error);
        els.loadingState.hidden = false;
        els.loadingState.innerHTML = "<strong>加载失败</strong><span>无法读取模型配置，请检查 <code>config.json</code> 是否存在且格式正确。</span>";
        els.emptyState.hidden = true;
        els.groupList.hidden = true;
      }
    }

    els.searchInput.addEventListener("input", renderGroups);
    els.brandFilter.addEventListener("change", renderGroups);
    els.typeFilter.addEventListener("change", renderGroups);
    els.groupFilter.addEventListener("change", renderGroups);

    loadConfig();
  </script>
</body>
</html>
